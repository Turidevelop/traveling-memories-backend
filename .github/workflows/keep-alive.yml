name: Keep Render Awake

on:
  schedule:
    # Cada 10 minutos (cron en UTC). Margen para los retrasos de GitHub Actions.
    - cron: "*/10 * * * *"
  workflow_dispatch:   # permite lanzarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the API
        run: curl -fsS https://traveling-memories-backend.onrender.com/ || exit 1